# ==============================================================
# TEMPLATE — CALIB AIRINS | Outage 1 | F2B
# Outage : 305120 → 305700 (580 s)
# Dataset : CALIB_26_02_25  |  IMU : AIRINS (tactical-grade)
# Strategy : Front-to-Back (F2B)
#
# Modifie les chemins sous "paths" et "trajectory" selon ton env.
# ==============================================================

mode: "georef_only"
scenario_name: "georef_ALL_traj_outage_1/georef_F2B"

# --------------------------------------------------------------
# Scanners
# --------------------------------------------------------------
scanners:
  ha_cfg:   "navtools_PDM/PDM_configs/scanner_HA_CALIB.yml"
  lr_cfg:   "navtools_PDM/PDM_configs/scanner_LR_CALIB.yml"
  puck_cfg: "navtools_PDM/PDM_configs/scanner_PUCK_CALIB.yml"

merge_groups:
  - name: "HA_LR"
    scanners: ["ha_cfg", "lr_cfg"]

# --------------------------------------------------------------
# Trajectoire ODyN F2B — remplacer par le .out approprié
# --------------------------------------------------------------
trajectory:
  type: "SBET"
  path: "/media/b085164/Elements/CALIB_26_02_25/ODyN_calib/AIRINS/Outage_1_305120_305700/F2B/out/traj_F2B_1.out"
  cfg:
    type: "SBET"

# --------------------------------------------------------------
# Fenêtre temporelle : [305120-60 , 305120+580+60]
# --------------------------------------------------------------
georef_time_window:
  enable: true
  outage: [305120.0, 580.0]
  margin_s: 60.0

# --------------------------------------------------------------
# Filtrage distance
# --------------------------------------------------------------
distance_filtering:
  enable: true
  max_distance_m: 30
  map_epsg: "EPSG:2056"
  filter_trj: null

# --------------------------------------------------------------
# Chemins
# --------------------------------------------------------------
paths:
  root_out_dir: "/media/b085164/Elements/CALIB_26_02_25"
  patcher_cfg:  "Patcher/config/MLS_Epalinges_config.yml"
  limatch_cfg:  "Patcher/submodules/limatch/configs/MLS_F2B_1.yml"
  gps_input:    "/media/b085164/Elements/CALIB_26_02_25/ODyN_calib/base_v0/in/GPS.txt"

# --------------------------------------------------------------
# Étapes
# --------------------------------------------------------------
steps:
  georef:          true
  merge:           true
  chunk:           false
  limatch:         false
  gps_outage_file: false

# --------------------------------------------------------------
# Merge
# --------------------------------------------------------------
merge:
  preset: "all"
  vux_scanners: ["ha_cfg", "lr_cfg"]
  puck_scanner: "puck_cfg"
  out_prefix: "merged_"
  out_suffix: "_HA_LR"
  output_suffix: "_VUX_PUCK"
  scanner_src_vux:  2
  scanner_src_puck: 1
  chunk_size: 10000000
  cleanup:
    enabled: true
    scanner_dirs: true

# --------------------------------------------------------------
# Merge correspondances
# --------------------------------------------------------------
merge_correspondences:
  enabled: true
  output_file: null

# --------------------------------------------------------------
# Chunking (désactivé par défaut — activer si besoin)
# --------------------------------------------------------------
chunk:
  source: "generate"
  existing_root: null
  merged_input_root: null   # rempli auto depuis root_out_dir/scenario_name/merged/ALL
  merged_group: null
  reference_scanner: "HA"
  output_root: null
  length_m: 15.0
  min_last_chunk_m: 10.0
  min_points: 2000
  epsg_out: "EPSG:2056"
  delimiter: ","
  skiprows: 0
  cloud_fmt: "las"
  time_field: "gps_time"
  manifest_name: "merged_manifest.csv"
  use_manifest: true

chunk_variant:
  type: "outage_window"
  outage_window:
    enabled: true
    output_root: null
    outages:
      - [305120.0, 580.0]
    pre_s: 10.0
    post_s: 10.0

# --------------------------------------------------------------
# LiMatch (désactivé par défaut)
# --------------------------------------------------------------
limatch:
  run: true
  output_root: null   # null = root_out_dir/scenario_name/limatch
  neighbor_k: 0
  do_cross_scan: false
  do_spatial_crossings: true
  crossings_output_root: null
  crossing_min_separation: 30
  crossing_overlap_margin_m: 3.0

# --------------------------------------------------------------
# Patcher (non utilisé ici)
# --------------------------------------------------------------
patcher:
  run: false
  source: "existing"
  output_root: null
  gps_outage_file:
    enabled: false
    output_root: null
    outages: []
