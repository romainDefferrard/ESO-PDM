# ==============================================================
# TEMPLATE — ECCR APX | Zone 3 | Combined
# Outage : 315642 → 316070 (428 s)
# Dataset : ECCR (échangeur autoroutier)  |  IMU : APX15
# Strategy : Combined — F2B + spatial crossings
#
# Note ECCR :
#   - georef_time_window utilise une liste d'outages (format ECCR)
#   - Chunks existants réutilisés depuis georef_F2B
#   - SDC HA/LR : 45 bytes/record (vs 40 standard)
#     → corriger firmware PPS artifacts si nécessaire
# ==============================================================

mode: "georef_only"
scenario_name: "georef_ALL_zone_3_outage/APX/georef_COMBINED"

# --------------------------------------------------------------
# Scanners  (configs ECCR — boresight/lever-arm spécifiques)
# --------------------------------------------------------------
scanners:
  ha_cfg:   "navtools_PDM/PDM_configs/scanner_HA_ECCR.yml"
  lr_cfg:   "navtools_PDM/PDM_configs/scanner_LR_ECCR.yml"
  puck_cfg: "navtools_PDM/PDM_configs/scanner_PUCK_ECCR.yml"

merge_groups:
  - name: "HA_LR"
    scanners: ["ha_cfg", "lr_cfg"]

# --------------------------------------------------------------
# Trajectoire ODyN Combined APX
# --------------------------------------------------------------
trajectory:
  type: "SBET"
  path: "/media/b085164/LaCie/2026spring_RD/ECCR/ODyN/zone_3_final/APX/COMBINED/out/out_v5/combined_3_ECCR_apx.out"
  cfg:
    type: "SBET"

# --------------------------------------------------------------
# Fenêtre temporelle — format liste (plusieurs outages possibles)
# --------------------------------------------------------------
georef_time_window:
  enable: true
  outages:
    - [315642.0, 428]
  margin_s: 10.0

# --------------------------------------------------------------
# Filtrage distance
# --------------------------------------------------------------
distance_filtering:
  enable: true
  max_distance_m: 30
  map_epsg: "EPSG:2056"
  filter_trj: null

# --------------------------------------------------------------
# Chemins
# --------------------------------------------------------------
paths:
  root_out_dir: "/media/b085164/LaCie/2026spring_RD/ECCR"
  patcher_cfg:  "Patcher/config/MLS_Epalinges_config.yml"
  limatch_cfg:  "Patcher/submodules/limatch/configs/MLS_F2B_1_APX.yml"
  gps_input:    "/media/b085164/LaCie/2026spring_RD/ECCR/ODyN/base/GPS.txt"

# --------------------------------------------------------------
# Étapes
# --------------------------------------------------------------
steps:
  georef:          true
  merge:           true
  chunk:           false
  limatch:         false
  gps_outage_file: false

# --------------------------------------------------------------
# Merge
# --------------------------------------------------------------
merge:
  preset: "all"
  vux_scanners: ["ha_cfg", "lr_cfg"]
  puck_scanner: "puck_cfg"
  out_prefix: "merged_"
  out_suffix: "_HA_LR"
  output_suffix: "_VUX_PUCK"
  scanner_src_vux:  2
  scanner_src_puck: 1
  chunk_size: 10000000
  cleanup:
    enabled: true
    scanner_dirs: true

# --------------------------------------------------------------
# Merge correspondances
# --------------------------------------------------------------
merge_correspondences:
  enabled: true
  output_file: null

# --------------------------------------------------------------
# Chunking — réutiliser les chunks F2B existants
# --------------------------------------------------------------
chunk:
  source: "existing"
  existing_root: "/media/b085164/LaCie/2026spring_RD/ECCR/georef_ALL_zone_3_outage/APX/georef_F2B/scenario_combined/chunks_20m"
  merged_input_root: "/media/b085164/LaCie/2026spring_RD/ECCR/georef_ALL_zone_3_outage/APX/georef_F2B/merged/ALL"
  merged_group: null
  reference_scanner: "HA"
  output_root: null
  length_m: 20.0
  min_last_chunk_m: 15.0
  min_points: 2000
  epsg_out: "EPSG:2056"
  delimiter: ","
  skiprows: 0
  cloud_fmt: "las"
  time_field: "gps_time"
  manifest_name: "merged_manifest.csv"
  use_manifest: true

chunk_variant:
  type: "outage_window"
  outage_window:
    enabled: true
    output_root: null
    outages:
      - [315642.0, 428]
    pre_s: 10.0
    post_s: 10.0

# --------------------------------------------------------------
# LiMatch
# --------------------------------------------------------------
limatch:
  run: true
  output_root: null
  neighbor_k: 0
  do_cross_scan: false
  do_spatial_crossings: true
  crossings_output_root: null
  crossing_min_separation: 10
  crossing_overlap_margin_m: 50.0

  cfg_overrides_f2b:
    uncertainty_r_min: 4.0
    uncertainty_r_max: 6.0

  cfg_overrides_crossings:
    uncertainty_r_min: 0.0
    uncertainty_r_max: 2.0

# --------------------------------------------------------------
# Patcher
# --------------------------------------------------------------
patcher:
  run: false
  source: "existing"
  output_root: null
  gps_outage_file:
    enabled: false
    output_root: null
    outages: []
