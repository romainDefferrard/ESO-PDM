# ==============================================================
# TEMPLATE — Nouveau dataset (à personnaliser)
#
# 1. Remplis tous les champs marqués TODO
# 2. Adapte scenario_name pour refléter outage/stratégie
# 3. Active les étapes dans la section "steps"
# ==============================================================

mode: "georef_only"       # georef_only | chunk | patcher
scenario_name: "TODO/georef_F2B"   # sous-dossier de sortie dans root_out_dir

# --------------------------------------------------------------
# Scanners — remplacer par les configs de ton dataset
# --------------------------------------------------------------
scanners:
  ha_cfg:   "navtools_PDM/PDM_configs/scanner_HA_TODO.yml"   # TODO
  lr_cfg:   "navtools_PDM/PDM_configs/scanner_LR_TODO.yml"   # TODO
  puck_cfg: "navtools_PDM/PDM_configs/scanner_PUCK_TODO.yml" # TODO

merge_groups:
  - name: "HA_LR"
    scanners: ["ha_cfg", "lr_cfg"]

# --------------------------------------------------------------
# Trajectoire ODyN
# --------------------------------------------------------------
trajectory:
  type: "SBET"
  path: "/path/to/ODyN/out/traj.out"   # TODO
  cfg:
    type: "SBET"

# --------------------------------------------------------------
# Fenêtre temporelle
# Choisir UNE des deux formes :
#   - outage simple : outage: [t_start, duration]
#   - liste outages : outages: [[t_start, dur], ...]
# --------------------------------------------------------------
georef_time_window:
  enable: true
  outage: [0.0, 0.0]     # TODO : [t_start_GPS_s, durée_s]
  margin_s: 60.0

# --------------------------------------------------------------
# Filtrage distance
# --------------------------------------------------------------
distance_filtering:
  enable: true
  max_distance_m: 30
  map_epsg: "EPSG:2056"
  filter_trj: null

# --------------------------------------------------------------
# Chemins
# --------------------------------------------------------------
paths:
  root_out_dir: "/path/to/dataset/root"   # TODO
  patcher_cfg:  "Patcher/config/MLS_Epalinges_config.yml"
  limatch_cfg:  "Patcher/submodules/limatch/configs/MLS_F2B_1.yml"
  gps_input:    "/path/to/GPS.txt"        # TODO

# --------------------------------------------------------------
# Étapes actives
# --------------------------------------------------------------
steps:
  georef:          true
  merge:           true
  chunk:           false
  limatch:         false
  gps_outage_file: false

# --------------------------------------------------------------
# Merge
# --------------------------------------------------------------
merge:
  preset: "all"                 # all | vux_only | puck_on_existing
  vux_scanners: ["ha_cfg", "lr_cfg"]
  puck_scanner: "puck_cfg"
  out_prefix: "merged_"
  out_suffix: "_HA_LR"
  output_suffix: "_VUX_PUCK"
  scanner_src_vux:  2
  scanner_src_puck: 1
  chunk_size: 10000000
  cleanup:
    enabled: true
    scanner_dirs: true

merge_correspondences:
  enabled: true
  output_file: null

# --------------------------------------------------------------
# Chunking
# --------------------------------------------------------------
chunk:
  source: "generate"            # generate | existing
  existing_root: null
  merged_input_root: null       # null = auto depuis scenario_name/merged/ALL
  merged_group: null
  reference_scanner: "HA"
  output_root: null
  length_m: 15.0
  min_last_chunk_m: 10.0
  min_points: 2000
  epsg_out: "EPSG:2056"
  delimiter: ","
  skiprows: 0
  cloud_fmt: "las"
  time_field: "gps_time"
  manifest_name: "merged_manifest.csv"
  use_manifest: true

chunk_variant:
  type: "outage_window"
  outage_window:
    enabled: true
    output_root: null
    outages:
      - [0.0, 0.0]             # TODO : même fenêtre que georef_time_window
    pre_s: 10.0
    post_s: 10.0

# --------------------------------------------------------------
# LiMatch
# --------------------------------------------------------------
limatch:
  run: true
  output_root: null
  neighbor_k: 0
  do_cross_scan: false
  do_spatial_crossings: true
  crossings_output_root: null
  crossing_min_separation: 30
  crossing_overlap_margin_m: 3.0
  # Décommenter pour des overrides par type de paire :
  # cfg_overrides_f2b:
  #   uncertainty_r_min: 0.0
  #   uncertainty_r_max: 2.0
  # cfg_overrides_crossings:
  #   uncertainty_r_min: 0.0
  #   uncertainty_r_max: 2.0

# --------------------------------------------------------------
# Patcher
# --------------------------------------------------------------
patcher:
  run: false
  source: "existing"
  output_root: null
  gps_outage_file:
    enabled: false
    output_root: null
    outages: []
