# Option patcher (si mode == patcher_then_limatch)
patcher:
  yml: "/home/b085164/PDM_Romain_Defferrard/ESO-PDM/ALS/config/MLS_Epalinges_config.yml"

limatch:
  enabled: true
  # si tu as une fonction run_limatch_from_patcher_config:
