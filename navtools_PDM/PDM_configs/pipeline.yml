georef:
  ha_cfg: "PDM_configs/georef_SAM-HA.yml"
  lr_cfg: "PDM_configs/georef_SAM-LR.yml"

merge:
  enabled: true
  out_dir: "/media/b085164/Elements/PCD_SAM/test/merged"
