# ==============================================================
# PIPELINE — OUTAGE 3
# Outage window : 306290 -> 306645 (350 s)
# Scenario      : georef_ALL_traj_outage_3
#
# NOTE — Evaluation uses two sub-windows only (GPS reference reliable):
#   Window 1 : 306290 -> 306405  (115 s, before GPS degradation)
#   Window 2 : 306560 -> 306640  ( 85 s, after GPS re-fix)
#   Excluded  : 306405 -> 306560  (155 s, sigma GPS too high)
# ==============================================================

mode: "georef_only"
scenario_name: "georef_ALL_traj_outage_3/APX/MERGED_V2"

# ==============================================================
# SCANNER CONFIGURATIONS
# ==============================================================
scanners:
  ha_cfg:   "navtools_PDM/PDM_configs/scanner_HA_CALIB.yml"
  lr_cfg:   "navtools_PDM/PDM_configs/scanner_LR_CALIB.yml"
  puck_cfg: "navtools_PDM/PDM_configs/scanner_PUCK_CALIB.yml"

merge_groups:
  - name: "HA_LR"
    scanners: ["ha_cfg", "lr_cfg"]

# ==============================================================
# TRAJECTORY
# ==============================================================
trajectory:
  type: "SBET"
  path: "/media/b085164/Elements/CALIB_26_02_25/ODyN_calib/APX/outage_3/out/outage_3_APX.out"
  cfg:
    type: "SBET"

# ==============================================================
# GEOREF TIME WINDOW FILTER
# [306290 - 60, 306290 + 350 + 60] = [306230, 306705]
# ==============================================================
georef_time_window:
  enable: true
  outage: [306290.0, 350.0]
  margin_s: 30.0

# ==============================================================
# DISTANCE FILTERING
# ==============================================================
distance_filtering:
  enable: true
  max_distance_m: 30
  map_epsg: "EPSG:2056"
  filter_trj: null

# ==============================================================
# PATHS
# ==============================================================
paths:
  root_out_dir: "/media/b085164/Elements/CALIB_26_02_25/"
  patcher_cfg:  "Patcher/config/MLS_Epalinges_config.yml"
  limatch_cfg:  "Patcher/submodules/limatch/configs/MLS_F2B_3.yml"
  gps_input:    "/media/b085164/Elements/CALIB_26_02_25/ODyN_calib/base_v0/in/GPS.txt"

# ==============================================================
# STEPS
# ==============================================================
steps:
  georef:          false
  merge:           true
  chunk:           false
  limatch:         false
  gps_outage_file: false

# ==============================================================
# MERGE
#
# preset options:
#   "vux_only"        — merge HA + LR → merged/HA_LR/
#   "all"             — merge HA + LR → merged/HA_LR/, then add PUCK → merged/ALL/
#   "puck_on_existing"— skip VUX merge, add PUCK onto an existing merged/HA_LR/
#                       (set vux_input_dir to override default location)
# ==============================================================
merge:
  preset: "puck_on_existing"

  # Which scanners to merge as VUX group (in order)
  vux_scanners: ["ha_cfg", "lr_cfg"]
  # Which scanner is the PUCK (used for presets "all" and "puck_on_existing")
  puck_scanner: "puck_cfg"

  # Output naming
  out_prefix: "merged_"
  out_suffix: "_HA_LR"        # suffix applied to VUX-only merged files
  output_suffix: "_VUX_PUCK"  # suffix applied to final ALL merged files

  # Source IDs written in scanner_src field
  scanner_src_vux:  2
  scanner_src_puck: 1

  # Processing
  chunk_size: 10000000

  # Only for preset "puck_on_existing": path to existing VUX merged dir.
  # If null, defaults to <root_out_dir>/<scenario_name>/merged/HA_LR
  vux_input_dir: "/media/b085164/Elements/CALIB_26_02_25/georef_ALL_traj_outage_3/APX/MERGED_V2/merged/HA_LR"

  # Cleanup intermediate dirs after a successful preset=all run.
  # Has NO effect for presets "vux_only" or "puck_on_existing".
  cleanup:
    enabled: true          # set to false to keep all intermediate dirs for inspection
    scanner_dirs: true     # also delete individual scanner georef dirs (HA/, LR/, PUCK/)
                           # set to false to keep them and only delete merged/HA_LR/

# ==============================================================
# MERGE CORRESPONDENCES
# ==============================================================
merge_correspondences:
  enabled: true
  output_file: null

# ==============================================================
# CHUNKING
# ==============================================================
chunk:
  source: "generate"
  existing_root: null #"/media/b085164/Elements/CALIB_26_02_25/georef_ALL_traj_outage_3/APX/scenario_combined/chunks_10m"
  merged_input_root: /media/b085164/Elements/CALIB_26_02_25/georef_ALL_traj_outage_3/APX/merged/ALL
  merged_group: null 
  reference_scanner: "HA"
  output_root: null
  length_m: 10.0
  min_last_chunk_m: 6.0
  min_points: 2000
  epsg_out: "EPSG:2056"
  delimiter: ","
  skiprows: 0
  cloud_fmt: "las"
  time_field: "gps_time"
  manifest_name: "merged_manifest.csv"
  use_manifest: true

# ==============================================================
# CHUNK VARIANT — outage window around outage 3
# ==============================================================
chunk_variant:
  type: "outage_window"

  outage_window:
    enabled: true
    output_root: null
    outages:
      - [306290.0, 350.0]       # [t_start, duration]
    pre_s: 10.0
    post_s: 10.0

# ==============================================================
# LIMATCH
# k+1 consecutive pairs  +  spatial crossings
# ==============================================================
limatch:
  run: true
  output_root: "/media/b085164/Elements/CALIB_26_02_25/georef_ALL_traj_outage_3/APX/georef_F2B/limatch_F2B_traj_F2B_v3"
  neighbor_k: 0
  do_cross_scan: false

  do_spatial_crossings: true
  crossings_output_root: null
  crossing_min_separation: 30
  crossing_overlap_margin_m: 5.0  # 30 avec la traj outage et 5 avec la traj F2B

# ==============================================================
# PATCHER (unused here)
# ==============================================================
patcher:
  run: true
  source: "run"
  output_root: "/media/b085164/Elements/CALIB_26_02_25/georef_ALL_traj_outage_3/APX/Patcher"
  gps_outage_file:
    enabled: false
    output_root: null
    outages: []
