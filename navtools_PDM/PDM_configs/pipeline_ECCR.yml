# ==============================================================
# PIPELINE — OUTAGE 1
# Outage window : 305120 -> 305700 (480 s)
# Scenario      : georef_ALL_traj_outage_1
# ==============================================================
 
mode: "georef_only"
scenario_name: "georef_ALL_zone_3_outage/APX/georef_COMBINED"
 
# ==============================================================
# SCANNER CONFIGURATIONS
# ==============================================================
scanners:
  ha_cfg:   "navtools_PDM/PDM_configs/scanner_HA_ECCR.yml"
  lr_cfg:   "navtools_PDM/PDM_configs/scanner_LR_ECCR.yml"
  puck_cfg: "navtools_PDM/PDM_configs/scanner_PUCK_ECCR.yml"
 
merge_groups:
  - name: "HA_LR"
    scanners: ["ha_cfg", "lr_cfg"]
 
# ==============================================================
# TRAJECTORY
# ==============================================================
trajectory:
  type: "SBET"
  path: "/media/b085164/LaCie/2026spring_RD/ECCR/ODyN/zone_3_final/APX/COMBINED/out/out_v5/combined_3_ECCR_apx.out" # traj ODyN
  cfg:
    type: "SBET"
 
# ==============================================================
# GEOREF TIME WINDOW FILTER
# Only georef points inside [305120 - 60, 305120 + 480 + 60] = [305060, 305660]
# ==============================================================
georef_time_window:
  enable: true
  margin_s: 10.0
  outages:
    - [315642.0, 428]    # 317263 -> 317327
 
# ==============================================================
# DISTANCE FILTERING
# ==============================================================
distance_filtering:
  enable: true
  max_distance_m: 30
  map_epsg: "EPSG:2056"
  filter_trj: null
 
# ==============================================================
# PATHS
# ==============================================================
paths:
  root_out_dir: "/media/b085164/LaCie/2026spring_RD/ECCR"
  patcher_cfg:  "Patcher/config/MLS_Epalinges_config.yml"
  limatch_cfg:  "Patcher/submodules/limatch/configs/MLS.yml"
  gps_input:    "/media/b085164/LaCie/2026spring_RD/ECCR/ODyN/base/GPS.txt"
 
# ==============================================================
# STEPS
# ==============================================================
steps:
  georef:          true
  merge:           true
  chunk:           false
  limatch:         false
  gps_outage_file: false

# ==============================================================
# MERGE
#
# preset options:
#   "vux_only"        — merge HA + LR → merged/HA_LR/
#   "all"             — merge HA + LR → merged/HA_LR/, then add PUCK → merged/ALL/
#   "puck_on_existing"— skip VUX merge, add PUCK onto an existing merged/HA_LR/
#                       (set vux_input_dir to override default location)
# ==============================================================
merge:
  preset: "all"

  # Which scanners to merge as VUX group (in order)
  vux_scanners: ["ha_cfg", "lr_cfg"]
  # Which scanner is the PUCK (used for presets "all" and "puck_on_existing")
  puck_scanner: "puck_cfg"

  # Output naming
  out_prefix: "merged_"
  out_suffix: "_HA_LR"        # suffix applied to VUX-only merged files
  output_suffix: "_VUX_PUCK"  # suffix applied to final ALL merged files

  # Source IDs written in scanner_src field
  scanner_src_vux:  2
  scanner_src_puck: 1

  # Processing
  chunk_size: 10000000

  # Only for preset "puck_on_existing": path to existing VUX merged dir.
  # If null, defaults to <root_out_dir>/<scenario_name>/merged/HA_LR
  # vux_input_dir: null

  # Cleanup intermediate dirs after a successful preset=all run.
  # Has NO effect for presets "vux_only" or "puck_on_existing".
  cleanup:
    enabled: true          # set to false to keep all intermediate dirs for inspection
    scanner_dirs: true     # also delete individual scanner georef dirs (HA/, LR/, PUCK/)
                           # set to false to keep them and only delete merged/HA_LR/

 
# ==============================================================
# MERGE CORRESPONDENCES
# ==============================================================
merge_correspondences:
  enabled: true
  output_file: null             # -> limatch_root/LiDAR_p2p.txt
 
# ==============================================================
# CHUNKING
# ==============================================================
chunk:
  source: "existing" # "generate" or "existing"
  existing_root: "/media/b085164/LaCie/2026spring_RD/ECCR/georef_ALL_zone_3_outage/APX/georef_F2B/scenario_combined/chunks_20m" # if "existing"
  merged_input_root: "/media/b085164/LaCie/2026spring_RD/ECCR/georef_ALL_zone_3_outage/APX/georef_F2B/merged/ALL" # In case of "generate"
  merged_group: null
  reference_scanner: "HA"
  output_root: null
  length_m: 20.0
  min_last_chunk_m: 15.0
  min_points: 2000
  epsg_out: "EPSG:2056"
  delimiter: ","
  skiprows: 0
  cloud_fmt: "las"
  time_field: "gps_time"
  manifest_name: "merged_manifest.csv"
  use_manifest: true
 
# ==============================================================
# CHUNK VARIANT — outage window around outage 1
# ==============================================================
chunk_variant:
  type: "outage_window"
 
  outage_window:
    enabled: true
    output_root: null           # null = root_out_dir/scenario_name/chunks
    outages:
      - [315642.0, 428]       # [t_start, duration]
    pre_s: 10.0
    post_s: 10.0
 
# ==============================================================
# LIMATCH
# k+1 consecutive pairs  +  spatial crossings
# Both outputs are independent directories with their own LiDAR_p2p.txt
# ==============================================================
limatch:
  run: true
  output_root: "/media/b085164/LaCie/2026spring_RD/ECCR/georef_ALL_zone_3_outage/APX/georef_F2B/limatch"           # null = root_out_dir/scenario_name/limatch
  neighbor_k: 0                 # k+1: each chunk matched with next
  do_cross_scan: false
 
  # Spatial crossings — saved independently in crossings_output_root
  do_spatial_crossings: true
  crossings_output_root: null   # null = limatch_output_root + "_crossings"
  crossing_min_separation: 10
  crossing_overlap_margin_m: 50
 
# ==============================================================
# PATCHER (unused here)
# ==============================================================
patcher:
  run: false
  source: "existing"
  output_root: null
  gps_outage_file:
    enabled: false
    output_root: null
    outages: []