# ==============================================================
# PIPELINE — OUTAGE 2
# Outage window : 305645 -> 306120 (475 s)
# Scenario      : georef_ALL_traj_outage_2
# ==============================================================

mode: "georef_only"
scenario_name: "georef_ALL_traj_outage_2/georef_S2S"

# ==============================================================
# SCANNER CONFIGURATIONS
# ==============================================================
scanners:
  ha_cfg:   "navtools_PDM/PDM_configs/scanner_HA_CALIB.yml"
  lr_cfg:   "navtools_PDM/PDM_configs/scanner_LR_CALIB.yml"
  puck_cfg: "navtools_PDM/PDM_configs/scanner_PUCK_CALIB.yml"

# ==============================================================
# TRAJECTORY
# ==============================================================
trajectory:
  type: "SBET"
  path: "/media/b085164/Elements/CALIB_26_02_25/ODyN_calib/Outage_2_305645_306120/S2S/out/S2S_outage_2.out"
  cfg:
    type: "SBET"

# ==============================================================
# GEOREF TIME WINDOW FILTER
# Only georef points inside [305645 - 30, 305645 + 475 + 30] = [305615, 306650]
# ==============================================================
georef_time_window:
  enable: true
  outage: [305645.0, 475.0]
  margin_s: 30.0

# ==============================================================
# DISTANCE FILTERING
# ==============================================================
distance_filtering:
  enable: true
  max_distance_m: 30
  map_epsg: "EPSG:2056"
  filter_trj: null

# ==============================================================
# PATHS
# ==============================================================
paths:
  root_out_dir: "/media/b085164/Elements/CALIB_26_02_25"
  patcher_cfg:  "Patcher/config/MLS_Epalinges_config.yml"
  limatch_cfg:  "Patcher/submodules/limatch/configs/MLS_F2B_2.yml"
  gps_input:    "/media/b085164/Elements/CALIB_26_02_25/ODyN_calib/base_v0/in/GPS.txt"

# ==============================================================
# STEPS
# ==============================================================
steps:
  georef:          false
  merge:           true
  chunk:           false
  limatch:         false
  gps_outage_file: false

# ==============================================================
# MERGE
#
# preset options:
#   "vux_only"        — merge HA + LR → merged/HA_LR/
#   "all"             — merge HA + LR → merged/HA_LR/, then add PUCK → merged/ALL/
#   "puck_on_existing"— skip VUX merge, add PUCK onto an existing merged/HA_LR/
#                       (set vux_input_dir to override default location)
# ==============================================================
merge:
  preset: "all"

  # Which scanners to merge as VUX group (in order)
  vux_scanners: ["ha_cfg", "lr_cfg"]
  # Which scanner is the PUCK (used for presets "all" and "puck_on_existing")
  puck_scanner: "puck_cfg"

  # Output naming
  out_prefix: "merged_"
  out_suffix: "_HA_LR"        # suffix applied to VUX-only merged files
  output_suffix: "_VUX_PUCK"  # suffix applied to final ALL merged files

  # Source IDs written in scanner_src field
  scanner_src_vux:  2
  scanner_src_puck: 1

  # Processing
  chunk_size: 10000000

  # Only for preset "puck_on_existing": path to existing VUX merged dir.
  # If null, defaults to <root_out_dir>/<scenario_name>/merged/HA_LR
  # vux_input_dir: null

  # Cleanup intermediate dirs after a successful preset=all run.
  # Has NO effect for presets "vux_only" or "puck_on_existing".
  cleanup:
    enabled: true          # set to false to keep all intermediate dirs for inspection
    scanner_dirs: true     # also delete individual scanner georef dirs (HA/, LR/, PUCK/)
                           # set to false to keep them and only delete merged/HA_LR/

# ==============================================================
# CHUNKING
# ==============================================================
chunk:
  source: "existing"
  existing_root: "/media/b085164/Elements/CALIB_26_02_25/georef_ALL_traj_outage_2/APX/georef_F2B/scenario_combined/chunks_50m"
  merged_input_root: "/media/b085164/Elements/CALIB_26_02_25/georef_ALL_traj_outage_2/APX/georef_F2B/merged/ALL"
  merged_group: null
  reference_scanner: "HA"
  output_root: null
  length_m: 50.0
  min_last_chunk_m: 20.0
  min_points: 2000
  epsg_out: "EPSG:2056"
  delimiter: ","
  skiprows: 0
  cloud_fmt: "las"
  time_field: "gps_time"
  manifest_name: "merged_manifest.csv"
  use_manifest: true

# ==============================================================
# CHUNK VARIANT — outage window around outage 2
# ==============================================================
chunk_variant:
  type: "outage_window"

  outage_window:
    enabled: true
    output_root: null
    outages:
      - [305645.0, 475.0]       # [t_start, duration]
    pre_s: 10.0
    post_s: 10.0

# ==============================================================
# LIMATCH
# k+1 consecutive pairs  +  spatial crossings
# ==============================================================
limatch:
  run: true
  output_root: "/media/b085164/Elements/CALIB_26_02_25/georef_ALL_traj_outage_2/APX/georef_F2B/limatch_F2B_traj_F2B_v2"
  neighbor_k: 0
  do_cross_scan: false

  do_spatial_crossings: true
  crossings_output_root: null
  crossing_min_separation: 15
  crossing_overlap_margin_m: 20.0

  cfg_overrides_f2b:
    uncertainty_r: 1.5
  cfg_overrides_crossings:
    uncertainty_r: 45

# ==============================================================
# MERGE CORRESPONDENCES
# ==============================================================
merge_correspondences:
  enabled: true
  output_file: null

# ==============================================================
# PATCHER (unused here)
# ==============================================================
patcher:
  run: false
  source: "existing"
  output_root: null
  gps_outage_file:
    enabled: false
    output_root: null
    outages: []