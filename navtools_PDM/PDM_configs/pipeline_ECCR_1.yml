# ==============================================================
# PIPELINE — OUTAGE 1
# Outage window : 305120 -> 305700 (480 s)
# Scenario      : georef_ALL_traj_outage_1
# ==============================================================
 
mode: "chunk"
scenario_name: "georef_ALL_zone_1_outage"
 
# ==============================================================
# SCANNER CONFIGURATIONS
# ==============================================================
scanners:
  ha_cfg:   "navtools_PDM/PDM_configs/scanner_HA_ECCR.yml"
  lr_cfg:   "navtools_PDM/PDM_configs/scanner_LR_ECCR.yml"
  puck_cfg: "navtools_PDM/PDM_configs/scanner_PUCK_ECCR.yml"
 
merge_groups:
  - name: "HA_LR"
    scanners: ["ha_cfg", "lr_cfg"]
 
# ==============================================================
# TRAJECTORY
# ==============================================================
trajectory:
  type: "SBET"
  path: "/media/b085164/LaCie/2026spring_RD/ECCR/ODyN/base/out/ODyN_GNSS_INS.out" # traj ODyN
  cfg:
    type: "SBET"
 
# ==============================================================
# GEOREF TIME WINDOW FILTER
# Only georef points inside [305120 - 60, 305120 + 480 + 60] = [305060, 305660]
# ==============================================================
georef_time_window:
  enable: true
  margin_s: 10.0
  outages:
    - [317263.0, 320]
  #  - [315642.0, 428]    # 317263 -> 317327
  #  - [317553.0, 30.0]    # 317553 -> 317583
  #   - [317291, 40]
 
# ==============================================================
# DISTANCE FILTERING
# ==============================================================
distance_filtering:
  enable: true
  max_distance_m: 30
  map_epsg: "EPSG:2056"
  filter_trj: null
 
# ==============================================================
# PATHS
# ==============================================================
paths:
  root_out_dir: "/media/b085164/LaCie/2026spring_RD/ECCR"
  patcher_cfg:  "Patcher/config/MLS_Epalinges_config.yml"
  limatch_cfg:  "Patcher/submodules/limatch/configs/MLS.yml"
  gps_input:    "/media/b085164/LaCie/2026spring_RD/ECCR/ODyN/base/GPS.txt"
 
# ==============================================================
# STEPS
# ==============================================================
steps:
  georef:           true
  merge:            true
  vux_puck_merge:   true
  chunk:            false
  limatch:          false
  gps_outage_file:  false
 
# ==============================================================
# MERGE HA+LR
# ==============================================================
merge:
  out_prefix: "merged_"
  out_suffix: "_HA_LR"
 
# ==============================================================
# VUX+PUCK MERGE
# ==============================================================
vux_puck_merge:
  enabled: true
  name: "ALL"
  vux_group: "HA_LR"
  puck_scanner: "puck_cfg"
  vux_input_dir: null           # null = auto-resolved from scenario structure
  output_dir: null              # null = root_out_dir/scenario_name/merged/ALL
  manifest_path: null
  output_suffix: "_VUX_PUCK"
  scanner_src_vux: 2
  scanner_src_puck: 1
  chunk_size: 10000000
 
# ==============================================================
# MERGE CORRESPONDENCES
# ==============================================================
merge_correspondences:
  enabled: true
  output_file: null             # -> limatch_root/LiDAR_p2p.txt
 
# ==============================================================
# CHUNKING
# ==============================================================
chunk:
  source: "existing"
  existing_root: "/media/b085164/LaCie/2026spring_RD/ECCR/georef_ALL_zone_3_outage/scenario_combined/chunks_15m"
  merged_input_root: null #"/media/b085164/LaCie/2026spring_RD/ECCR/georef_ALL_zone_3_outage/merged/ALL"
  merged_group: null
  reference_scanner: "HA"
  output_root: null
  length_m: 15.0
  min_last_chunk_m: 9.0
  min_points: 2000
  epsg_out: "EPSG:2056"
  delimiter: ","
  skiprows: 0
  cloud_fmt: "las"
  time_field: "gps_time"
  manifest_name: "merged_manifest.csv"
  use_manifest: true
 
# ==============================================================
# CHUNK VARIANT — outage window around outage 1
# ==============================================================
chunk_variant:
  type: "outage_window"
 
  outage_window:
    enabled: true
    output_root: null           # null = root_out_dir/scenario_name/chunks
    outages:
      - [315642.0, 428]       # [t_start, duration]
    pre_s: 10.0
    post_s: 10.0
 
# ==============================================================
# LIMATCH
# k+1 consecutive pairs  +  spatial crossings
# Both outputs are independent directories with their own LiDAR_p2p.txt
# ==============================================================
limatch:
  run: true
  output_root: "/media/b085164/LaCie/2026spring_RD/ECCR/georef_ALL_zone_3_outage/limatch_F2B"           # null = root_out_dir/scenario_name/limatch
  neighbor_k: 1                 # k+1: each chunk matched with next
  do_cross_scan: true
 
  # Spatial crossings — saved independently in crossings_output_root
  do_spatial_crossings: true
  crossings_output_root: null   # null = limatch_output_root + "_crossings"
  crossing_min_separation: 20
  crossing_overlap_margin_m: 5
 
# ==============================================================
# PATCHER (unused here)
# ==============================================================
patcher:
  run: false
  source: "existing"
  output_root: null
  gps_outage_file:
    enabled: false
    output_root: null
    outages: []